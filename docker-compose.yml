services:
  food:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/food.db
      SECRET_KEY: ${SECRET_KEY:-dev-only-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-aidy}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-aidy123}
    restart: unless-stopped
